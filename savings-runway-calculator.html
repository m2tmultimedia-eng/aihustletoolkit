<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Savings Runway Calculator | AI Hustle Toolkit</title>
<meta name="description" content="Calculate how many months your savings can cover your expenses." />

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.wrap{display:flex;justify-content:center;padding:24px;}
.container{max-width:800px;width:100%;}
.card{background:rgba(255,255,255,0.07);padding:28px;border-radius:20px;}
input,button{width:100%;padding:14px;margin:10px 0;border-radius:12px;}
button{background:#d4af37;}
.result{margin-top:20px;padding:15px;background:#1e293b;border-radius:12px;display:none;}
</style>

</head>

<body>
<div class="wrap">
<div class="container">

<a href="index.html">← Back to Home</a>

<div class="card">
<h1>🏦 Savings Runway Calculator</h1>

<input id="savings" placeholder="Total savings">
<input id="expenses" placeholder="Monthly expenses">

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

<div class="content">
<h2>How this works</h2>
<p>Divides savings by monthly expenses.</p>

<h2>Important note</h2>
<p>This assumes steady expenses and no emergencies.</p>

<h2>Example</h2>
<p>$6000 savings / $2000 expenses = 3 months runway.</p>
</div>

</div>
</div>
</div>

<script>
function calc(){
let s=document.getElementById("savings").value;
let e=document.getElementById("expenses").value;
let months=s/e;

let r=document.getElementById("result");
r.style.display="block";
r.innerHTML="Runway: " + months.toFixed(1) + " months";
}
</script>

</body>
</html>
