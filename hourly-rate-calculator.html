<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hourly Rate Goal Calculator | AI Hustle Toolkit</title>
  <meta name="description" content="Use this hourly rate goal calculator to find out what you need to charge per hour to hit your monthly income target." />
  <meta name="keywords" content="hourly rate calculator, freelance rate calculator, pricing calculator, income goal calculator" />
  <meta name="author" content="AI Hustle Toolkit" />
  <meta name="robots" content="index, follow" />

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-main: #0f172a;
      --bg-secondary: #111827;
      --panel: rgba(255,255,255,0.07);
      --panel-border: rgba(255,255,255,0.10);
      --text-main: #f8fafc;
      --text-soft: #cbd5e1;
      --gold: #d4af37;
      --gold-dark: #b89322;
      --blue-accent: #38bdf8;
      --shadow: 0 14px 40px rgba(0,0,0,0.28);
    }

    html, body { margin:0; padding:0; }

    body {
      font-family: Arial;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.10), transparent 28%),
        linear-gradient(180deg, var(--bg-main), var(--bg-secondary));
    }

    .wrap { display:flex; justify-content:center; padding:24px; }
    .container { max-width:800px; width:100%; }

    .card {
      background: var(--panel);
      border:1px solid var(--panel-border);
      border-radius:20px;
      padding:28px;
      box-shadow:var(--shadow);
    }

    input, button {
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:12px;
    }

    button { background:var(--gold); font-weight:bold; }

    .result {
      margin-top:20px;
      padding:16px;
      background:rgba(56,189,248,0.08);
      border-radius:12px;
      display:none;
    }
  </style>
</head>

<body>
<div class="wrap">
<div class="container">

<a href="index.html">← Back to Home</a>

<div class="card">
<h1>💵 Hourly Rate Goal Calculator</h1>

<input id="goal" placeholder="Monthly income goal">
<input id="hours" placeholder="Hours per week">

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

<div class="content">
<h2>How this works</h2>
<p>Divides your income goal by your available work hours.</p>

<h2>Important note</h2>
<p>This is an estimate. Real pricing should include taxes and downtime.</p>

<h2>Example</h2>
<p>$4000 goal / 80 hours = $50/hour.</p>
</div>

</div>
</div>
</div>

<script>
function calc(){
let goal=document.getElementById("goal").value;
let hours=document.getElementById("hours").value;
let rate=goal/(hours*4);

let r=document.getElementById("result");
r.style.display="block";
r.innerHTML="You need $" + rate.toFixed(2) + "/hour.";
}
</script>

</body>
</html>
