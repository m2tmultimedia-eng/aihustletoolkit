<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Monthly Income Calculator | AI Hustle Toolkit</title>
<meta name="description" content="Estimate your monthly income based on your hourly rate and hours worked." />

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.wrap{display:flex;justify-content:center;padding:24px;}
.container{max-width:800px;width:100%;}
.card{background:rgba(255,255,255,0.07);padding:28px;border-radius:20px;}
input,button{width:100%;padding:14px;margin:10px 0;border-radius:12px;}
button{background:#d4af37;}
.result{margin-top:20px;padding:15px;background:#1e293b;border-radius:12px;display:none;}
</style>

</head>

<body>
<div class="wrap">
<div class="container">

<a href="index.html">← Back to Home</a>

<div class="card">
<h1>📈 Monthly Income Calculator</h1>

<input id="hours" placeholder="Hours per week">
<input id="rate" placeholder="Hourly rate">

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

<div class="content">
<h2>How this works</h2>
<p>Multiplies weekly hours by rate and projects monthly income.</p>

<h2>Important note</h2>
<p>Income varies based on consistency and demand.</p>

<h2>Example</h2>
<p>15 hrs/week at $25 = $1500/month.</p>
</div>

</div>
</div>
</div>

<script>
function calc(){
let h=document.getElementById("hours").value;
let r=document.getElementById("rate").value;
let total=h*r*4;

let res=document.getElementById("result");
res.style.display="block";
res.innerHTML="Monthly income: $" + total;
}
</script>

</body>
</html>
